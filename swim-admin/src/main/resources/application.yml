server:
  port: 8080

spring:
  application:
    name: swim-admin
  datasource:
    url: jdbc:mysql://localhost:3306/parenting_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: ab123168
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
