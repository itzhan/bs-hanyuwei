    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: "change_me_to_a_long_random_secret"
    expire-minutes: 4320
    issuer: "parenting-platform"
  file:
    upload-dir: "uploads"

logging:
  level:
    com.xiangyongshe.swim_admin: debug
